name: Smoke test starters

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    name: ${{ matrix.starter }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        starter:
          - basic
          - ai-chat
          - blog
          - calculator
          - dashboard
          - ecommerce
          - marketing
          - portfolio
          - resume
          - saas
          - survey

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Smoke
        env:
          STRIPE_SECRET_KEY: ${{ matrix.starter == 'ecommerce' && 'sk_test_dummy_ci_key' || '' }}
          SITE_URL: http://localhost:8787
        run: node scripts/smoke.test.mjs ${{ matrix.starter }}
